<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Art & Calligraphy - Long Yue</title>
  <style>
    :root {
      --ink: #2b1820;
      --muted: #765866;
      --wine: #9b2947;
      --rose: #d85d7b;
      --paper: rgba(255, 250, 247, 0.9);
      --gold: #ba7a33;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      background:
        linear-gradient(160deg, rgba(43, 24, 32, 0.88), rgba(120, 40, 62, 0.56) 38%, rgba(255, 237, 230, 0.95)),
        url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7?auto=format&fit=crop&w=1800&q=80") center/cover fixed;
    }

    .page {
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(26, 16, 22, 0.34), rgba(255, 242, 244, 0.95) 58%);
      padding: 1.25rem;
    }

    /* Navigation */
    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1180px;
      margin: 0 auto 3rem auto;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.92);
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      margin-right: 1.5rem;
      transition: color 0.2s ease;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--gold);
      border-bottom: 1px solid var(--gold);
      padding-bottom: 0.18rem;
    }

    .site-mark {
      color: rgba(255, 255, 255, 0.92);
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Header */
    .gallery-header {
      max-width: 1180px;
      margin: 0 auto 3rem auto;
      color: #fff9f4;
      text-shadow: 0 2px 22px rgba(0, 0, 0, 0.38);
    }

    .gallery-header h1 {
      margin: 0;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1;
    }

    .gallery-header p {
      max-width: 640px;
      margin: 1rem 0 0;
      color: rgba(255, 249, 244, 0.9);
      font-size: 1.15rem;
      line-height: 1.6;
    }

    /* Masonry Art Grid */
    .art-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 1180px;
      margin: 0 auto;
      padding-bottom: 4rem;
    }

    .art-card {
      background: rgba(255, 250, 247, 0.93);
      border: 1px solid rgba(155, 41, 71, 0.14);
      border-radius: 8px;
      box-shadow: 0 20px 58px rgba(70, 32, 44, 0.14);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .art-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 65px rgba(70, 32, 44, 0.25);
    }

    .art-image {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 1px solid rgba(155, 41, 71, 0.1);
    }

    .art-details {
      padding: 1.2rem;
      background: var(--paper);
    }

    .art-category {
      color: var(--wine);
      font-family: Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .art-title {
      margin: 0;
      font-size: 1.3rem;
      color: var(--ink);
      font-weight: 600;
    }

    @media (max-width: 820px) {
      .art-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    
    <!-- Navigation -->
    <nav class="topline">
      <div class="nav-links">
        <a href="index.html">Stories</a>
        <a href="art.html" class="active">Gallery</a>
      </div>
      <div class="site-mark">Long Yue</div>
    </nav>

    <!-- Header -->
    <header class="gallery-header">
      <h1>The Gallery</h1>
      <p>A curated collection of calligraphy, freehand brushwork, and sketches.</p>
    </header>

    <!-- Gallery Grid -->
    <section class="art-grid" aria-label="Artwork Gallery">
      
      <!-- Calligraphy Card -->
      <article class="art-card">
        <img src="_Calligraphy/ChiBiFu-XingShu.jpg" alt="ChiBiFu XingShu" class="art-image" loading="lazy">
        <div class="art-details">
          <div class="art-category">Calligraphy</div>
          <h2 class="art-title">Chi Bi Fu - Xing Shu</h2>
        </div>
      </article>

      <!-- Sketch Card -->
      <article class="art-card">
        <img src="_Chinese_Painting/Sketch/bridge.jpg" alt="Bridge Sketch" class="art-image" loading="lazy">
        <div class="art-details">
          <div class="art-category">Sketch</div>
          <h2 class="art-title">Bridge Study</h2>
        </div>
      </article>

      <!-- Freehand Brushwork Card -->
      <article class="art-card">
        <img src="_Chinese_Painting/Freehand_brushwork/DaXieYi-SongShu-DaXieYi.jpg" alt="Pine Tree Brushwork" class="art-image" loading="lazy">
        <div class="art-details">
          <div class="art-category">Da Xie Yi</div>
          <h2 class="art-title">Pine Tree</h2>
        </div>
      </article>
      
      <!-- Flower and Bird Card -->
      <article class="art-card">
        <img src="_Chinese_Painting/Chinese_Flower_and_Bird_Painting/JinJiFuGui.jpg" alt="Jin Ji Fu Gui" class="art-image" loading="lazy">
        <div class="art-details">
          <div class="art-category">Flower & Bird</div>
          <h2 class="art-title">Jin Ji Fu Gui</h2>
        </div>
      </article>

      <!-- Landscape Card -->
      <article class="art-card">
        <img src="_Chinese_Painting/Chinese_Landscape_Painting/YangZiRiver.jpg" alt="Yangtze River Landscape" class="art-image" loading="lazy">
        <div class="art-details">
          <div class="art-category">Landscape</div>
          <h2 class="art-title">Yangtze River</h2>
        </div>
      </article>

    </section>
  </main>
</body>
</html>
