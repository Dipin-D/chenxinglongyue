<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Yue | The Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { bg: '#0f0a0b', text: '#f2ece4', gold: '#b59765' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f0a0b; color: #f2ece4; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050304; }
        ::-webkit-scrollbar-thumb { background: #3d2025; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.3; }
        .content-layer { position: relative; z-index: 10; }
        
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(181, 151, 101, 0.05) 0%, transparent 70%);
        }
        
        .portal-link {
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            border-bottom: 1px solid transparent;
        }
        .portal-link:hover {
            color: #b59765;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(181, 151, 101, 0.5);
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body class="antialiased selection:bg-brand-gold selection:text-black">
    <canvas id="bg-canvas"></canvas>

    <nav class="fixed w-full z-50 top-0 bg-brand-bg/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-[100rem] mx-auto px-10 py-6 flex justify-between items-center">
            <a href="index.html" class="text-[11px] font-light tracking-[0.4em] uppercase text-brand-gold">Long Yue</a>
            <div class="space-x-10 text-[10px] font-light tracking-[0.3em] uppercase hidden md:block">
                <a href="novels.html" class="hover:text-brand-gold transition-colors duration-500">Novels</a>
                <a href="calligraphy.html" class="hover:text-brand-gold transition-colors duration-500">Calligraphy</a>
                <a href="chinese-painting.html" class="hover:text-brand-gold transition-colors duration-500">Painting</a>
                <a href="seal-engraving.html" class="hover:text-brand-gold transition-colors duration-500">Seal Engraving</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center content-layer hero-gradient px-6 text-center">
        <span class="text-brand-gold/60 text-[10px] tracking-[0.5em] uppercase mb-8 font-light">Archive & Collection</span>
        <h1 class="text-6xl md:text-8xl lg:text-[100px] font-serif font-light mb-16 italic">A Private Library</h1>
        
        <div class="flex flex-col gap-8 md:gap-12 mt-8 text-2xl md:text-4xl font-serif font-light">
            <a href="novels.html" class="portal-link">I. Fictions & Novels (小说)</a>
            <a href="calligraphy.html" class="portal-link">II. Calligraphy (书法)</a>
            <a href="chinese-painting.html" class="portal-link">III. Chinese Painting (国画)</a>
            <a href="seal-engraving.html" class="portal-link">IV. Seal Engraving (金石)</a>
        </div>
    </section>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        const canvas = document.querySelector('#bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const posArray = new Float32Array(600);
        for(let i=0; i<600; i++) posArray[i] = (Math.random() - 0.5) * 40;
        
        const particlesGeometry = new THREE.BufferGeometry();
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.035, color: 0xb59765, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = (e.clientX/window.innerWidth)-0.5; mouseY = (e.clientY/window.innerHeight)-0.5; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            targetX += (mouseX - targetX) * 0.015; targetY += (mouseY - targetY) * 0.015;
            particlesMesh.rotation.y = clock.getElapsedTime()*0.01 + targetX*0.15;
            particlesMesh.rotation.x = clock.getElapsedTime()*0.01 + targetY*0.15;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
