<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Yue | Digital Museum</title>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050304; color: #f2ece4; font-family: 'Playfair Display', serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* The Entrance Screen */
        #loader { position: fixed; inset: 0; background: #050304; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1.5s ease; }
        .enter-btn { cursor: pointer; padding: 1.5rem 3rem; border: 1px solid #b59765; color: #b59765; background: transparent; text-transform: uppercase; letter-spacing: 0.3em; margin-top: 2rem; }
        
        /* Hidden content source */
        .content-source { display: none; }
    </style>
</head>
<body>

    <!-- 1. The Entrance -->
    <div id="loader">
        <h1 style="font-size: 2rem; opacity: 0.7; letter-spacing: 0.5em;">LONG YUE</h1>
        <button class="enter-btn" onclick="startExperience()">Enter the Gallery</button>
    </div>

    <!-- 2. The 3D Engine -->
    <canvas id="canvas-container"></canvas>

    <!-- 3. Your Existing Content (Read by the JS) -->
    <div class="content-source">
        <img src="path/to/painting1.jpg" data-title="Spring Breeze" data-desc="Room II">
        <img src="path/to/painting2.jpg" data-title="The Great Wall" data-desc="Room III">
    </div>

    <script>
        // --- Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#canvas-container'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // --- Ambient Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // --- The Gallery Engine ---
        function createGallery() {
            const sources = document.querySelectorAll('.content-source img');
            sources.forEach((img, index) => {
                const geometry = new THREE.PlaneGeometry(5, 7);
                const texture = new THREE.TextureLoader().load(img.src);
                const material = new THREE.MeshStandardMaterial({ map: texture, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(geometry, material);
                
                // Position rooms on Z axis (creating depth)
                mesh.position.z = -index * 15; 
                mesh.position.x = (index % 2 === 0) ? -5 : 5;
                scene.add(mesh);

                // Add Spotlight to each piece
                const spot = new THREE.SpotLight(0xffffff, 50);
                spot.position.set(mesh.position.x, 5, mesh.position.z + 5);
                spot.target = mesh;
                scene.add(spot);
            });
        }

        // --- Camera & Scrolling ---
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        lenis.on('scroll', (e) => {
            // Camera movement driven by scroll
            camera.position.z = -e.scroll * 0.05;
        });

        // --- Entrance Sequence ---
        function startExperience() {
            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => loader.style.display = 'none', 1500);
            
            // Start Animation Loop
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Init
        createGallery();
        camera.position.z = 5;
    </script>
</body>
</html>
