<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Yue | Museum of Chinese Painting</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter','sans-serif'],
        serif: ['Playfair Display','serif'],
        cjk: ['Noto Serif SC','serif']
      },
      colors: {
        brand: {
          bg: '#070606',
          text: '#f2ece4',
          gold: '#b59765'
        }
      }
    }
  }
}
</script>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#1a1412 0%,#070606 45%,#020202 100%);
  color:#f2ece4;
  overflow-x:hidden;
}

/* fog layer */
.fog{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 60%);
  animation: drift 20s infinite alternate ease-in-out;
  pointer-events:none;
  z-index:1;
}

@keyframes drift{
  0%{transform:translateX(-2%) translateY(-1%);}
  100%{transform:translateX(2%) translateY(1%);}
}

/* gold dust */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:0;
}

/* content */
.content{
  position:relative;
  z-index:10;
}

/* entrance */
#entrance{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.title{
  font-size:5rem;
  letter-spacing:0.4em;
}

.subtitle{
  opacity:0.6;
  margin-top:1rem;
}

/* gallery rooms */
.room{
  padding:10rem 2rem;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.05);
}

.room h2{
  font-size:3rem;
  margin-top:1rem;
}

/* frames */
.frame{
  background:#0c0a0a;
  padding:1.5rem;
  display:inline-block;
  margin:2rem;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.04);
  transition:transform 1s ease;
}

.frame:hover{
  transform:scale(1.03);
}

.frame img{
  max-width:100%;
  filter:grayscale(10%) contrast(1.05);
}

/* spotlight */
.spotlight{
  position:relative;
  display:inline-block;
}

.spotlight::before{
  content:"";
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(181,151,101,0.18),transparent 70%);
  filter:blur(30px);
  pointer-events:none;
}

/* language toggle */
.lang-zh{display:none;}
</style>
</head>

<body>

<div class="fog"></div>
<canvas id="dust"></canvas>

<!-- ENTRANCE -->
<section id="entrance">
  <div class="title">LONG YUE</div>
  <div class="subtitle">Museum of Chinese Painting</div>
  <div style="margin-top:3rem;opacity:0.4;">Scroll to Enter</div>
</section>

<div class="content">

<!-- ROOM I -->
<section class="room">
  <div>ROOM I</div>
  <h2>Figure Painting / 人物画</h2>
  <p style="opacity:0.4">The gallery is preparing this exhibition.</p>
</section>

<!-- ROOM II -->
<section class="room">
  <div>ROOM II</div>
  <h2>Flora & Fauna / 花鸟画</h2>

  <div class="spotlight">
    <div class="frame">
      <img src="国画_Chinese_Painting/Chinese_Flower_and_Bird_Painting/HuaKaiFuGui.jpg">
    </div>
  </div>

  <div class="spotlight">
    <div class="frame">
      <img src="国画_Chinese_Painting/Chinese_Flower_and_Bird_Painting/MengHu.jpg">
    </div>
  </div>

</section>

<!-- ROOM III -->
<section class="room">
  <div>ROOM III</div>
  <h2>Landscapes / 山水画</h2>

  <div class="spotlight">
    <div class="frame">
      <img src="国画_Chinese_Painting/Chinese_Landscape_Painting/HuangShanYunHai.jpg">
    </div>
  </div>

  <div class="spotlight">
    <div class="frame">
      <img src="国画_Chinese_Painting/Chinese_Landscape_Painting/YangZiRiver.jpg">
    </div>
  </div>

</section>

<!-- ROOM IV -->
<section class="room">
  <div>ROOM IV</div>
  <h2>XieYi / Sketches</h2>

  <div class="spotlight">
    <div class="frame">
      <img src="国画_Chinese_Painting/Freehand_brushwork/DaXieYi-LanCao.jpg">
    </div>
  </div>

</section>

<!-- END -->
<section class="room">
  <h2 style="font-size:2rem;opacity:0.7;">
    “Every brushstroke carries the breath of history.”
  </h2>
</section>

</div>

<script>
// GOLD DUST PARTICLES
const canvas = document.getElementById("dust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(181,151,101,0.3)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += 0.2 + p.d;
    p.x += Math.sin(p.y*0.01)*0.2;

    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

// ENTRANCE FADE
gsap.from("#entrance .title",{opacity:0,y:50,duration:2});
gsap.from("#entrance .subtitle",{opacity:0,y:30,duration:2,delay:0.5});
</script>

</body>
</html>
